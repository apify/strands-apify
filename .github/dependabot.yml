version: 2
updates:
  # Python runtime + dev dependencies declared in pyproject.toml
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      dev-tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "hatch"

  # GitHub Actions used by .github/workflows/*
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
